<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mikhail Nazarov</title>
  <meta name="description" content="Mikhail Nazarov - official website launching in September 2026. For inquiries: hello@nazarov.co.nz">
  <style>
    :root {
      --bg: #375587;
      --text: rgba(255, 255, 255, 0.86);
      --muted: rgba(255, 255, 255, 0.68);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Arial Narrow", "Roboto Condensed", "Helvetica Neue Condensed",
                   "Helvetica Neue", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
    }

    .page {
      width: 100%;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
      padding: clamp(28px, 5vw, 72px);
    }

    .name {
      position: absolute;
      top: clamp(70px, 10vw, 150px);
      right: clamp(58px, 10vw, 150px);
      text-align: right;
      font-weight: 700;
      font-size: clamp(62px, 8vw, 128px);
      line-height: 1.18;
      letter-spacing: -0.035em;
      text-transform: uppercase;
      color: var(--text);
    }

    .info {
      position: absolute;
      left: clamp(48px, 7vw, 120px);
      bottom: clamp(82px, 12vw, 170px);
      width: min(760px, calc(100% - 96px));
      text-align: left;
      font-weight: 400;
      font-size: clamp(24px, 2.25vw, 42px);
      line-height: 1.55;
      letter-spacing: 0.015em;
      color: var(--text);
    }

    .info p {
      margin: 0 0 clamp(34px, 4vw, 58px) 0;
    }

    .info a {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.45);
    }

    .location {
      color: var(--text);
    }

    @media (max-width: 760px) {
      .page {
        padding: 28px;
      }

      .name {
        top: 58px;
        right: 30px;
        font-size: clamp(46px, 14vw, 78px);
        line-height: 1.15;
      }

      .info {
        left: 30px;
        right: 30px;
        bottom: 58px;
        width: auto;
        font-size: clamp(18px, 5vw, 28px);
        line-height: 1.5;
      }

      .info p {
        margin-bottom: 30px;
      }
    }

    @media (max-width: 420px) {
      .name {
        font-size: 44px;
      }

      .info {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="page" aria-label="Mikhail Nazarov temporary website page">
    <div class="name">
      MIKHAIL<br>
      NAZAROV
    </div>

    <section class="info" aria-label="Website information">
      <p>Official website launching in September 2026</p>

      <p>
        For inquiries:<br>
        <a href="mailto:hello@nazarov.co.nz">hello@nazarov.co.nz</a><br>
        <span class="location">Auckland, New Zealand</span>
      </p>
    </section>
  </main>
</body>
</html>
